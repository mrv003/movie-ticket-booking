{% extends 'base.html' %}

{% block title %}CineTix - Home{% endblock %}

{% block content %}
<section class="hero">
    <h1>Experience The Magic of Cinema</h1>
    <p>Book tickets for the latest movies and secure the best seats.</p>
</section>

<section class="movies-grid">
    {% for movie in movies %}
    <div class="movie-card">
        <div class="poster-container">
            <img src="{{ url_for('static', filename='images/' + movie.poster) }}" alt="{{ movie.title }}" class="movie-poster">
        </div>
        <div class="movie-info">
            <h2>{{ movie.title }}</h2>
            <p>{{ movie.description }}</p>
            <a href="{{ url_for('movie_details', movie_id=movie.id) }}" class="btn primary-btn">Book Now</a>
        </div>
    </div>
    {% endfor %}
</section>
{% endblock %}
